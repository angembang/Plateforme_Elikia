services:

  mysql:
    image: mysql:8.0
    container_name: elikia-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    container_name: elikia-backend
    build:
      context: backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/elikia_db
      SPRING_DATASOURCE_USERNAME: elikia_user
      SPRING_DATASOURCE_PASSWORD: elikia_password
      SPRING_PROFILES_ACTIVE: prod
    restart: always
    volumes:
      - ./uploads:/uploads

  frontend:
    build:
      context: ./frontend
    container_name: elikia-frontend
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

volumes:
  mysql_data:
