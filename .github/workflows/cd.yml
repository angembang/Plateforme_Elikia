# Workflow name displayed in GitHub Actions interface
name: CD - Deploy to VPS

# Trigger the workflow on push events to the main branch
on:
  push:
    branches:
      - main

# Define the jobs executed by this workflow
jobs:
  deploy:
    # Use the latest Ubuntu GitHub-hosted runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      # This downloads the project source code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Start SSH agent and load private key
      # This allows GitHub Actions to authenticate securely with the VPS via SSH
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # Private SSH key stored securely in GitHub Secrets
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Step 3: Add the VPS host to known_hosts
      # Prevents SSH from prompting for host verification (non-interactive environment)
      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -4 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Step 4: Ensure the deployment directory exists on the VPS
      # If ~/app does not exist, it is created
      - name: Prepare deployment directory
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd ~/app || mkdir ~/app && cd ~/app
          "

      # Step 5: Synchronize project files to the VPS
      # rsync efficiently transfers only changed files
      # --delete ensures removed files locally are also removed remotely
      # .git directory is excluded to avoid unnecessary transfer
      - name: Sync project
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/app/

      # Step 6: Restart Docker containers on the VPS
      # Stops running containers
      # Rebuilds images if necessary
      # Starts containers in detached mode
      - name: Restart containers
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd ~/app && \
            docker compose down && \
            docker compose build && \
            docker compose up -d
          "